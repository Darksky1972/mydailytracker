# Nginx para Senal — reverse proxy con login (Basic Auth).
# Certbot añadirá automáticamente el bloque HTTPS (443) y el redirect al ejecutar:
#   sudo certbot --nginx -d DOMAIN_PLACEHOLDER
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER;

    # Permite subir los CSV de Whoop a través del proxy (por si los importas online).
    client_max_body_size 50M;

    location / {
        # --- Login del navegador (usuario/contraseña) ---
        auth_basic "Senal - acceso privado";
        auth_basic_user_file /etc/nginx/.htpasswd-senal;

        # --- Proxy a Streamlit (escuchando solo en localhost) ---
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- WebSocket (Streamlit lo necesita para actualizarse en vivo) ---
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
